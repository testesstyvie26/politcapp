<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conta não autorizada — Politapp</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #0c0f14; --text: #e8ecf2; --muted: #8b95a8; --accent: #3d8bfd; --border: rgba(255,255,255,0.08); --surface: #141a24; --warn: #f87171; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "DM Sans", system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 1.25rem; }
    .card { max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; color: var(--warn); }
    p { color: var(--muted); line-height: 1.55; margin: 0 0 1rem; font-size: 0.95rem; }
    button { font: inherit; font-weight: 600; padding: 0.6rem 1.1rem; border-radius: 8px; border: none; cursor: pointer; background: var(--accent); color: #041018; }
  </style>
  <link rel="stylesheet" href="css/site-shell-nav.css?v=6" />
  <link rel="stylesheet" href="css/site-theme.css?v=2" />
</head>
<body>
  <a class="politapp-skip" href="#politapp-main">Ir ao conteúdo</a>
  <div class="card">
    <h1 id="politapp-main" tabindex="-1">Acesso não autorizado</h1>
    <p>O seu pedido de conta não foi aprovado. Se precisar de ajuda, contacte um administrador do Politapp.</p>
    <p style="margin:0 0 1rem;font-size:0.88rem"><a href="guia-uso.html">Guia de uso do site</a></p>
    <p><button type="button" id="btnSair">Deslogar</button></p>
  </div>
  <script src="js/auth-config.js"></script>
  <script type="module">
    import { getSupabase } from "./js/auth-client.mjs";
    import { politappAuthReady } from "./js/auth-guard.mjs";

    try {
      await politappAuthReady;
    } catch {
      /* redirecionado pelo guard */
    }

    document.getElementById("btnSair").addEventListener("click", async () => {
      const sb = getSupabase();
      if (sb) await sb.auth.signOut();
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
