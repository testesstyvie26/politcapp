# Repositório: site estático servido pelo GitHub Pages (sem build Node).
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar arquivos principais
        run: test -f index.html && test -f package.json && test -f js/auth-config.js && test -f js/auth-guard.mjs && test -f js/login.mjs && test -f sql/supabase-org-tarefas.sql
