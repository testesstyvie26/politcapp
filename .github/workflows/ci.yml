# Repositório: site estático servido pelo GitHub Pages (sem build Node).
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar arquivos principais
        run: test -f index.html && test -f package.json && test -f js/auth-config.js && test -f js/auth-guard.mjs && test -f js/login.mjs && test -f js/admin-guard.mjs && test -f js/admin-hub.mjs && test -f js/admin-unidades.mjs && test -f js/admin-aprovacoes.mjs && test -f admin.html && test -f admin-unidades.html && test -f admin-aprovacoes.html && test -f sql/supabase-org-tarefas.sql && test -f sql/supabase-conta-aprovacao.sql && test -f sql/supabase-admin-unidades-policies.sql && test -f sql/supabase-default-unidade-gestao-central.sql
