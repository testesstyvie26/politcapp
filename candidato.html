<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil do candidato | PolitApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #141a24;
      --surface2: #1c2433;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf2;
      --muted: #8b95a8;
      --accent: #3d8bfd;
      --accent-dim: rgba(61, 139, 253, 0.15);
      --ok: #34d399;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(61, 139, 253, 0.18), transparent),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    .site-nav {
      display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; margin-bottom: 1rem; font-size: 0.9rem;
    }
    .site-nav a { color: var(--muted); text-decoration: none; font-weight: 500; }
    .site-nav a:hover { color: var(--accent); }
    .back { display: inline-block; margin-bottom: 1rem; color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .back:hover { text-decoration: underline; }

    .hero {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
    }
    @media (max-width: 560px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .hero img { margin: 0 auto; }
    }
    .hero img {
      width: 140px; height: 140px; border-radius: 14px; object-fit: cover; background: var(--surface2);
    }
    .hero h1 { margin: 0 0 0.35rem; font-size: 1.45rem; letter-spacing: -0.02em; }
    .hero .sub { color: var(--muted); font-size: 0.95rem; margin: 0 0 0.75rem; }
    .badge {
      display: inline-block; padding: 0.2rem 0.55rem; border-radius: 6px;
      font-size: 0.78rem; font-weight: 600; background: var(--accent-dim); color: var(--accent); margin-right: 0.35rem;
    }
    .status-ok { background: rgba(52, 211, 153, 0.15); color: var(--ok); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .panel h2 {
      margin: 0 0 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    dl.grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.35rem 1.25rem;
      font-size: 0.92rem;
      margin: 0;
    }
    dl.grid dt { color: var(--muted); margin: 0; }
    dl.grid dd { margin: 0; font-family: "JetBrains Mono", monospace; font-size: 0.88rem; }

    .redes { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .redes a {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.65rem; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); text-decoration: none; font-size: 0.82rem; font-weight: 500;
    }
    .redes a:hover { border-color: var(--accent); color: var(--accent); }

    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th, td { padding: 0.55rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border); }
    th {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); font-weight: 600;
    }
    tr:hover td { background: rgba(61, 139, 253, 0.04); }

    .note { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin: 0; }
    .note a { color: var(--accent); }
    .loading, .error { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    .error { color: #f87171; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite; margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .site-credit {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .site-credit a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .site-credit a:hover {
      text-decoration: underline;
    }

    .site-credit-role {
      font-weight: 400;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <script src="js/api-config.js"></script>
  <script src="js/auth-guard.js"></script>
  <div class="wrap">
    <nav class="site-nav" aria-label="Navegação">
      <a href="index.html">Lista de candidatos</a>
      <a href="executivo.html">Visão executiva</a>
      <a href="insights-rj.html">Insights RJ</a>
      <a href="midia-social.html">Mídia social</a>
      <a href="tarefas.html">Tarefas</a>
      <a href="login.html">Entrar</a>
      <a href="https://dadosabertos.camara.leg.br/swagger/api.html" target="_blank" rel="noopener">API Câmara</a>
    </nav>
    <a class="back" href="index.html">← Voltar à lista</a>
    <div id="app"><div class="loading"><div class="spinner"></div>Carregando perfil…</div>

    <footer class="site-credit" role="contentinfo">
      <p>
        Criado por
        <a href="https://testesstyvie26.github.io/RafaelRibeiro/" target="_blank" rel="noopener noreferrer">Rafael Ribeiro</a>
        <span class="site-credit-role">— Especialista em Segurança da Informação &amp; DevSecOps</span>
        ·
        <a href="https://www.linkedin.com/in/rafaelribeiro01" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </p>
    </footer>
  </div>

  <script src="tse-votos-2022.js"></script>
  <script>
    const API = "https://dadosabertos.camara.leg.br/api/v2/deputados";
    const JSON_HDR = { Accept: "application/json" };

    function getId() {
      const q = new URLSearchParams(window.location.search);
      const id = parseInt(q.get("id") || "", 10);
      return Number.isFinite(id) ? id : null;
    }

    function getTseParams() {
      const q = new URLSearchParams(window.location.search);
      const sq = (q.get("tse") || "").trim();
      const uf = (q.get("uf") || "").trim().toUpperCase();
      return sq && uf.length === 2 ? { sqcand: sq, uf } : null;
    }

    function fmtInt(n) {
      if (n == null || !Number.isFinite(n)) return "—";
      return n.toLocaleString("pt-BR");
    }

    function renderPainelTse(tv) {
      if (!tv) {
        return `<div class="panel"><h2>Resultado eleitoral 2022</h2><p class="note">Não foi possível localizar este nome na votação nominal de deputado federal (TSE) para a UF informada.</p></div>`;
      }
      return `
          <div class="panel">
            <h2>Eleições 2022 — Deputado Federal (1º turno)</h2>
            <p class="note" style="margin-bottom:0.75rem">Fonte: <code>resultados.tse.jus.br</code>, eleição 546, arquivo dados-simplificados por UF.</p>
            <dl class="grid">
              <dt>Votos nominais (na UF)</dt><dd><strong>${fmtInt(tv.vap)}</strong></dd>
              <dt>Percentual (válidos UF)</dt><dd>${tv.pvap != null ? escapeHtml(tv.pvap) + "%" : "—"}</dd>
              <dt>Situação</dt><dd>${escapeHtml(tv.st || "—")}</dd>
              <dt>Número de urna</dt><dd class="mono">${escapeHtml(tv.n || "—")}</dd>
              <dt>Coligação / legenda</dt><dd>${escapeHtml(tv.cc || "—")}</dd>
              <dt>Sequencial TSE</dt><dd class="mono">${escapeHtml(tv.sqcand || "—")}</dd>
            </dl>
          </div>`;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: JSON_HDR });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function extractRedesUrls(raw) {
      if (raw == null || raw === "") return [];
      if (typeof raw === "string") {
        return raw
          .split(/[\n;,]+/)
          .map((s) => s.trim())
          .filter((s) => /^https?:\/\//i.test(s));
      }
      if (Array.isArray(raw)) {
        const out = [];
        for (const item of raw) {
          out.push(...extractRedesUrls(item));
        }
        return [...new Set(out)];
      }
      if (typeof raw === "object") {
        if (raw.url) return extractRedesUrls(raw.url);
        if (raw.uri) return extractRedesUrls(raw.uri);
        const vals = Object.values(raw);
        const urls = vals.filter((v) => typeof v === "string" && /^https?:\/\//i.test(v));
        if (urls.length) return [...new Set(urls)];
        for (const v of vals) {
          if (v && typeof v === "object") urls.push(...extractRedesUrls(v));
        }
        return [...new Set(urls)];
      }
      return [];
    }

    function labelRede(url) {
      const u = url.toLowerCase();
      if (u.includes("twitter.com") || u.includes("x.com")) return "𝕏 / Twitter";
      if (u.includes("instagram.com")) return "Instagram";
      if (u.includes("facebook.com")) return "Facebook";
      if (u.includes("youtube.com") || u.includes("youtu.be")) return "YouTube";
      if (u.includes("tiktok.com")) return "TikTok";
      if (u.includes("linkedin.com")) return "LinkedIn";
      if (u.includes("threads.net")) return "Threads";
      return "Web";
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function fmt(s) {
      if (s == null || s === "") return "—";
      return escapeHtml(String(s));
    }

    function renderHistorico(rows) {
      if (!rows.length) {
        return '<p class="note">Não há registros de histórico ou o endpoint não retornou dados.</p>';
      }
      const sorted = [...rows].sort((a, b) => {
        const la = parseInt(a.idLegislatura ?? a.legislatura?.id ?? 0, 10) || 0;
        const lb = parseInt(b.idLegislatura ?? b.legislatura?.id ?? 0, 10) || 0;
        return lb - la;
      });
      const body = sorted
        .map((h) => {
          const leg = h.idLegislatura ?? h.legislatura?.id ?? "—";
          const ini = h.dataInicio ?? h.dataInicioLegislatura ?? "—";
          const fim = h.dataFim ?? h.dataFimLegislatura ?? "—";
          const sit = h.situacao ?? h.descricaoSituacao ?? "—";
          const part = h.siglaPartido ?? "—";
          const uf = h.siglaUf ?? "—";
          const cond = h.condicaoEleitoral ?? "—";
          const nome = h.nomeEleitoral ?? h.nomeParlamentar ?? h.nome ?? "—";
          return `<tr>
            <td class="mono">${fmt(leg)}</td>
            <td>${fmt(ini)} → ${fmt(fim)}</td>
            <td>${fmt(sit)}</td>
            <td><strong>${fmt(part)}</strong></td>
            <td>${fmt(uf)}</td>
            <td>${fmt(cond)}</td>
            <td>${fmt(nome)}</td>
          </tr>`;
        })
        .join("");
      return `<div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Leg.</th><th>Período</th><th>Situação</th><th>Partido</th><th>UF</th><th>Condição</th><th>Nome parlamentar</th>
        </tr></thead><tbody>${body}</tbody></table></div>`;
    }

    async function load() {
      const app = document.getElementById("app");
      const id = getId();
      const tseQ = getTseParams();

      if (!id && !tseQ) {
        app.innerHTML =
          '<p class="error">Use <code>candidato.html?id=204379</code> (Câmara) ou <code>candidato.html?tse=SEQUENCIAL&uf=SP</code> (somente TSE).</p>';
        return;
      }

      if (tseQ && !id) {
        try {
          const cache = window.TSE2022DF ? await TSE2022DF.load() : null;
          const tv = cache ? cache.bySqcand.get(String(tseQ.sqcand)) : null;
          const nome = tv ? tv.nm : "Candidato (TSE)";
          app.innerHTML = `
            <div class="hero">
              <div style="width:140px;height:140px;border-radius:14px;background:var(--surface2)"></div>
              <div>
                <h1>${escapeHtml(nome)}</h1>
                <p class="sub" style="margin-top:0">
                  <span class="badge">${escapeHtml(tseQ.uf)}</span>
                  <span class="badge">Somente registro TSE</span>
                </p>
                <p class="note" style="margin-top:0.75rem">Sem ficha de deputado na API da Câmara — perfil montado a partir do resultado nominal de 2022.</p>
              </div>
            </div>
            ${renderPainelTse(tv)}
            <div class="panel">
              <h2>Prestação de contas e candidatura</h2>
              <p class="note">Consulte o <a href="https://divulgacandcontas.tse.jus.br/divulga/#/home" target="_blank" rel="noopener">DivulgaCandContas</a> com o nome e a UF.</p>
            </div>`;
        } catch (e) {
          console.error(e);
          app.innerHTML = `<p class="error">${escapeHtml(e.message)}</p>`;
        }
        return;
      }

      try {
        const [depRes, histRes] = await Promise.allSettled([
          fetchJson(`${API}/${id}`),
          fetchJson(`${API}/${id}/historico`),
        ]);

        if (depRes.status === "rejected") throw depRes.reason;
        const d = depRes.value;
        const u = d.ultimoStatus || {};
        const g = u.gabinete || {};
        const hist = histRes.status === "fulfilled" ? histRes.value.dados || histRes.value : [];

        const nome = u.nome || d.nomeCivil || "—";
        const nomeUrna = u.nomeEleitoral || nome;
        const partido = u.siglaPartido || "—";
        const uf = u.siglaUf || "—";
        const leg = u.idLegislatura ?? "—";
        const situacao = u.situacao || "—";
        const cond = u.condicaoEleitoral || "—";
        const email = (u.email || g.email || d.email || "").trim();
        const tel = (g.telefone || "").trim();
        const foto = u.urlFoto || "";
        const site = (d.urlWebsite || "").trim();
        const redesRaw = d.redeSocial;
        const redes = [...new Set([...extractRedesUrls(redesRaw), ...(site ? [site] : [])])];

        const cpfDigits = d.cpf ? String(d.cpf).replace(/\D/g, "") : "";
        const cpf =
          cpfDigits.length === 11
            ? cpfDigits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4")
            : d.cpf
              ? String(d.cpf)
              : "—";

        let redesHtml = "";
        if (redes.length) {
          redesHtml = `<div class="redes">${redes
            .map(
              (url) =>
                `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(
                  labelRede(url)
                )}</a>`
            )
            .join("")}</div>`;
        } else {
          redesHtml = '<p class="note">Redes e site não cadastrados na API para este parlamentar.</p>';
        }

        const tseNome = encodeURIComponent(nomeUrna);
        const tseUf = encodeURIComponent(uf);
        const divulga = `https://divulgacandcontas.tse.jus.br/divulga/#/home`;
        const dadosTse = `https://dadosabertos.tse.jus.br/dataset/candidatos`;

        let tv = null;
        try {
          if (window.TSE2022DF) {
            const cache = await TSE2022DF.load();
            tv = TSE2022DF.lookupVote(cache, uf, [nome, nomeUrna, u.nome]);
          }
        } catch (e) {
          console.warn(e);
        }
        const painelTse = renderPainelTse(tv);

        app.innerHTML = `
          <div class="hero">
            <img src="${escapeHtml(foto)}" alt="" width="140" height="140" loading="eager" onerror="this.style.display='none'" />
            <div>
              <h1>${escapeHtml(nome)}</h1>
              ${nomeUrna !== nome ? `<p class="sub">Nome de urna: ${escapeHtml(nomeUrna)}</p>` : ""}
              <p class="sub" style="margin-top:0">
                <span class="badge">${escapeHtml(partido)}</span>
                <span class="badge">${escapeHtml(uf)}</span>
                <span class="badge">Leg. ${escapeHtml(leg)}</span>
                <span class="badge status-ok">${escapeHtml(situacao)}</span>
                <span class="badge">${escapeHtml(cond)}</span>
              </p>
              <p class="note" style="margin-top:0.75rem">Identificador na API: <strong class="mono">${id}</strong></p>
            </div>
          </div>

          <div class="panel">
            <h2>Contato e gabinete</h2>
            <dl class="grid">
              <dt>E-mail</dt><dd>${email ? `<a href="mailto:${escapeHtml(email)}">${escapeHtml(email)}</a>` : "—"}</dd>
              <dt>Telefone</dt><dd>${tel ? escapeHtml(tel) : "—"}</dd>
              <dt>Gabinete</dt><dd>${[g.predio && `Prédio ${g.predio}`, g.andar && `${g.andar}º andar`, g.sala && `Sala ${g.sala}`].filter(Boolean).join(" · ") || "—"}</dd>
              <dt>Página na Câmara</dt><dd><a href="https://www.camara.leg.br/deputados/${id}" target="_blank" rel="noopener">camara.leg.br/deputados/${id}</a></dd>
            </dl>
          </div>

          <div class="panel">
            <h2>Redes sociais e site</h2>
            ${redesHtml}
          </div>

          <div class="panel">
            <h2>Dados pessoais (cadastro)</h2>
            <dl class="grid">
              <dt>Nome civil</dt><dd>${fmt(d.nomeCivil)}</dd>
              <dt>CPF</dt><dd>${fmt(cpf)}</dd>
              <dt>Nascimento</dt><dd>${fmt(d.dataNascimento)}</dd>
              <dt>Naturalidade</dt><dd>${fmt(d.municipioNascimento)} / ${fmt(d.ufNascimento)}</dd>
              <dt>Sexo</dt><dd>${fmt(d.sexo)}</dd>
              <dt>Escolaridade</dt><dd>${fmt(d.escolaridade)}</dd>
            </dl>
          </div>

          <div class="panel">
            <h2>Histórico na Câmara (mandatos e filiações)</h2>
            <p class="note" style="margin-bottom:0.75rem">
              Evolução de partido, situação e condição eleitoral ao longo das legislaturas — útil para contextualizar <strong>trajetória política</strong> junto a dados de campanha.
            </p>
            ${renderHistorico(Array.isArray(hist) ? hist : [])}
          </div>

          ${painelTse}

          <div class="panel">
            <h2>Campanhas, prestação de contas e outras fontes</h2>
            <p class="note">
              Para detalhes de campanha, doadores e despesas, use o <a href="${divulga}" target="_blank" rel="noopener">DivulgaCandContas (TSE)</a>
              e o <a href="${dadosTse}" target="_blank" rel="noopener">portal de dados abertos do TSE</a>.
              Busque pelo <strong>nome de urna</strong> (${escapeHtml(nomeUrna)}), <strong>UF</strong> (${escapeHtml(uf)}) e pela <strong>eleição de 2022</strong>.
            </p>
            <p class="note" style="margin-top:0.75rem">
              Pesquisa na web:
              <a href="https://www.google.com/search?q=${tseNome}+deputado+federal+${tseUf}+2022+votação" target="_blank" rel="noopener">notícias e contexto sobre votação</a>
            </p>
          </div>
        `;
      } catch (e) {
        console.error(e);
        app.innerHTML = `<p class="error">Não foi possível carregar o deputado: ${escapeHtml(e.message)}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
