# Deploy: cd workers && npx wrangler deploy
#
# Opção A — subdomínio workers.dev: em portal-transparencia-config.js defina POLITAPP_PORTAL_API_BASE com essa URL.
# Opção B — mesmo domínio (recomendado para politcapp.com.br): no painel Cloudflare do domínio,
#   Workers & Pages → o worker → Triggers → Routes:
#   politcapp.com.br/api-de-dados*
#   www.politcapp.com.br/api-de-dados*
#   (o site em JS já usa https://politcapp.com.br/api-de-dados como base)

name = "politapp-portal-transparencia-proxy"
main = "portal-transparencia-proxy.js"
compatibility_date = "2024-10-01"
